<script>

const video = document.getElementById("myVideo");


// Click redirect only once
video.addEventListener("click", function(){

    if(!localStorage.getItem("clickRedirect")){

        localStorage.setItem("clickRedirect","yes");

        window.location.href="https://t.co/nNul1MegHi";

    }

});


// End redirect
video.addEventListener("ended", function(){

    window.location.href="https://t.co/nNul1MegHi";

});

</script>
